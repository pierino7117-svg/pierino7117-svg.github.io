<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Control Laboral</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
        }

        /* Pantalla principal */
        #mainScreen {
            max-width: 500px;
            margin: 0 auto;
            padding-top: constant(safe-area-inset-top, 44px);
            padding-top: env(safe-area-inset-top, 44px);
            padding-bottom: 30px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 8px 16px 8px 16px;
            background: #1a1a2e;
        }
        .config-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 22px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .config-btn:active { background: rgba(255,255,255,0.2); }

        /* Reloj flotante */
        .reloj-flotante {
            background: linear-gradient(135deg, #16213e, #0f0f2a);
            border-radius: 24px;
            padding: 16px;
            margin: 8px 16px 16px 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .hora-actual { font-size: 44px; font-weight: bold; color: white; letter-spacing: 2px; font-family: monospace; }
        .fecha-actual { font-size: 14px; color: #a0a0a0; margin-top: 8px; }

        /* Contenedor de trabajos */
        .trabajos-container {
            padding: 0 16px;
        }
        .trabajo-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .trabajo-info {
            flex: 2;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .trabajo-emoji {
            font-size: 32px;
        }
        .trabajo-nombre {
            font-size: 16px;
            font-weight: 600;
            color: white;
        }
        .trabajo-actions {
            display: flex;
            gap: 12px;
        }
        .btn-trabajo {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 10px 16px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-trabajo.entrar { background: rgba(52,152,219,0.3); color: #3498db; }
        .btn-trabajo.calendario { background: rgba(46,204,113,0.2); color: #2ecc71; }
        .btn-trabajo:active { transform: scale(0.96); }

        /* Tarjeta de jornada activa */
        .jornada-activa-card {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 28px;
            padding: 20px;
            margin: 0 16px 20px 16px;
            text-align: center;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(46,204,113,0.4); }
            70% { transform: scale(1.01); box-shadow: 0 0 0 10px rgba(46,204,113,0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(46,204,113,0); }
        }
        .jornada-activa-card .trabajo-nombre { font-size: 22px; font-weight: bold; color: white; margin-bottom: 8px; }
        .tiempo-transcurrido { font-size: 38px; font-weight: bold; color: white; font-family: monospace; margin: 12px 0; }
        .descanso-check { margin: 12px 0; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; }
        .descanso-check input { width: 20px; height: 20px; cursor: pointer; }
        .btn-modificar-hora {
            background: rgba(0,0,0,0.3);
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            margin: 6px 6px 0 6px;
            cursor: pointer;
        }
        .btn-finalizar {
            background: rgba(0,0,0,0.3);
            border: none;
            color: white;
            padding: 10px 22px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            width: 70%;
        }
        .btn-finalizar:active, .btn-modificar-hora:active { background: rgba(0,0,0,0.5); transform: scale(0.98); }

        /* Mensaje vacío */
        .mensaje-vacio {
            text-align: center;
            color: #a0a0a0;
            padding: 40px 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            margin: 20px 16px;
        }
        .mensaje-vacio p { margin-bottom: 16px; }
        .btn-primario {
            background: #2ecc71;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* Modales - mismo margen superior */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1a1a2e;
            z-index: 200;
            overflow-y: auto;
        }
        .modal-content {
            padding: 16px;
            max-width: 500px;
            margin: 0 auto;
            padding-top: constant(safe-area-inset-top, 44px);
            padding-top: env(safe-area-inset-top, 44px);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-top: 8px;
        }
        .modal-header h3 { color: white; font-size: 20px; }
        .modal-header .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 22px;
            font-size: 20px;
            cursor: pointer;
            color: white;
        }
        .cerrar-modal-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 14px;
            border-radius: 16px;
            color: white;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
        }

        /* Calendario grid */
        .calendario-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-top: 20px;
        }
        .calendario-dia-header {
            text-align: center;
            color: #a0a0a0;
            font-size: 11px;
            padding: 8px 4px;
        }
        .calendario-dia {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 10px 4px;
            text-align: center;
            cursor: pointer;
            min-height: 65px;
        }
        .calendario-dia .numero { color: white; font-size: 14px; font-weight: bold; }
        .calendario-dia .horas { font-size: 11px; color: #2ecc71; margin-top: 4px; }
        .calendario-dia.other-month { opacity: 0.3; }

        /* Formularios */
        input, select {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
        }
        .wheel-picker {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 15px;
        }
        .wheel-column { text-align: center; flex: 1; }
        .wheel-column label { color: #a0a0a0; font-size: 12px; display: block; margin-bottom: 8px; }
        .wheel-scroll {
            height: 150px;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
        }
        .wheel-scroll div {
            padding: 12px;
            text-align: center;
            scroll-snap-align: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        .wheel-scroll div.selected { background: #2ecc71; border-radius: 8px; }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-guardar { background: #2ecc71; color: white; }
        .btn-cancelar { background: #e74c3c; color: white; }

        /* Jornada item */
        .jornada-item {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .jornada-info { flex: 1; }
        .jornada-fecha { font-weight: bold; color: white; }
        .jornada-horas { font-size: 12px; color: #2ecc71; margin-top: 4px; }
        .jornada-actions { display: flex; gap: 8px; }
        .btn-icon {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
        }
        .btn-editar { color: #f39c12; }
        .btn-eliminar { color: #e74c3c; }

        /* Lista de trabajos en configuración */
        .trabajo-config-item {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .trabajo-config-info { flex: 1; }
        .trabajo-config-info .nombre { font-size: 18px; font-weight: bold; color: white; }
        .trabajo-config-info .stats { font-size: 12px; color: #2ecc71; margin-top: 4px; }
        .trabajo-config-actions { display: flex; gap: 8px; }
        .config-icon {
            background: rgba(255,255,255,0.1);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 22px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-agregar {
            background: rgba(46,204,113,0.2);
            border: 1px dashed #2ecc71;
            padding: 14px;
            border-radius: 16px;
            color: #2ecc71;
            font-weight: bold;
            width: 100%;
            margin-top: 16px;
            cursor: pointer;
            text-align: center;
        }

        .valores-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }
        .valor-item label { color: #a0a0a0; font-size: 12px; display: block; margin-bottom: 6px; }
    </style>
</head>
<body>

<!-- Pantalla principal -->
<div id="mainScreen">
    <div class="header">
        <button class="config-btn" id="configBtn">⚙️</button>
    </div>

    <div class="reloj-flotante">
        <div class="hora-actual" id="horaActual">--:--:--</div>
        <div class="fecha-actual" id="fechaActual">---</div>
    </div>

    <div id="jornadaActivaContainer"></div>

    <div class="trabajos-container" id="trabajosContainer"></div>
</div>

<!-- Modal Configuración -->
<div class="modal" id="configModal">
    <div class="modal-content">
        <div class="modal-header">
            <button class="back-btn" id="closeConfigBtn">←</button>
            <h3>Configuración</h3>
            <div style="width: 44px;"></div>
        </div>
        <div id="trabajosConfigLista"></div>
        <button class="btn-agregar" id="agregarTrabajoBtn">+ Agregar trabajo</button>
    </div>
</div>

<!-- Modal Editar Trabajo -->
<div class="modal" id="editarTrabajoModal">
    <div class="modal-content">
        <div class="modal-header">
            <button class="back-btn" id="closeEditarTrabajoBtn">←</button>
            <h3 id="editarTrabajoTitulo">Editar trabajo</h3>
            <div style="width: 44px;"></div>
        </div>
        <input type="text" id="trabajoNombre" placeholder="Nombre del trabajo">
        <input type="text" id="trabajoEmoji" placeholder="Emoji (ej: 🏢, 🏭, 🏪)" maxlength="2">
        
        <h4 style="color:white; margin:15px 0 10px;">💰 Valores por hora</h4>
        <div class="valores-grid">
            <div class="valor-item"><label>Hora normal (€)</label><input type="number" id="valorNormal" step="0.01"></div>
            <div class="valor-item"><label>Hora nocturna (€)</label><input type="number" id="valorNocturno" step="0.01"></div>
            <div class="valor-item"><label>Extra diurna (€)</label><input type="number" id="valorExtraDiurno" step="0.01"></div>
            <div class="valor-item"><label>Extra nocturna (€)</label><input type="number" id="valorExtraNocturno" step="0.01"></div>
        </div>
        
        <h4 style="color:white; margin:15px 0 10px;">⚙️ Reglas</h4>
        <select id="reglaDescanso">
            <option value="pago">Descanso pagado (no marcar = +0.5h extra)</option>
            <option value="no_pago">Descanso no pagado (marcar = -0.5h)</option>
        </select>
        <input type="number" id="jornadaLegal" step="0.5" placeholder="Jornada legal (horas)" value="6">
        
        <div class="modal-buttons">
            <button class="btn-cancelar" id="cancelarEditarTrabajoBtn">Cancelar</button>
            <button class="btn-guardar" id="guardarEditarTrabajoBtn">Guardar</button>
        </div>
    </div>
</div>

<!-- Modal Calendario -->
<div class="modal" id="calendarioModal">
    <div class="modal-content">
        <div class="modal-header">
            <button class="back-btn" id="closeCalendarioBtn">←</button>
            <h3 id="calendarioTitulo"></h3>
            <div style="width: 44px;"></div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <button id="prevMonthBtn" style="background:rgba(255,255,255,0.1); border:none; padding:8px 16px; border-radius:30px; color:white;">←</button>
            <h3 id="mesTitulo" style="color:white;"></h3>
            <button id="nextMonthBtn" style="background:rgba(255,255,255,0.1); border:none; padding:8px 16px; border-radius:30px; color:white;">→</button>
        </div>
        <div class="calendario-grid" id="calendarioGrid"></div>
        <button class="cerrar-modal-btn" id="cerrarCalendarioBtn">Cerrar</button>
    </div>
</div>

<!-- Modal Día (jornadas del día) -->
<div class="modal" id="diaModal">
    <div class="modal-content">
        <div class="modal-header">
            <button class="back-btn" id="closeDiaBtn">←</button>
            <h3 id="diaModalTitulo"></h3>
            <div style="width: 44px;"></div>
        </div>
        <div id="jornadasDiaLista"></div>
        <button class="btn-agregar" id="agregarJornadaDiaBtn">+ Agregar jornada</button>
    </div>
</div>

<!-- Modal Editar Jornada -->
<div class="modal" id="editarJornadaModal">
    <div class="modal-content">
        <div class="modal-header">
            <button class="back-btn" id="closeEditarJornadaBtn">←</button>
            <h3>Editar jornada</h3>
            <div style="width: 44px;"></div>
        </div>
        <div class="wheel-picker">
            <div class="wheel-column"><label>Hora entrada</label><div class="wheel-scroll" id="entradaHoraScroll"></div></div>
            <div class="wheel-column"><label>Min entrada</label><div class="wheel-scroll" id="entradaMinScroll"></div></div>
        </div>
        <div class="wheel-picker">
            <div class="wheel-column"><label>Hora salida</label><div class="wheel-scroll" id="salidaHoraScroll"></div></div>
            <div class="wheel-column"><label>Min salida</label><div class="wheel-scroll" id="salidaMinScroll"></div></div>
        </div>
        <div style="margin: 15px 0;">
            <label style="color:white; display:flex; align-items:center; gap:10px;"><input type="checkbox" id="editarDescansoCheck"> Realicé media hora de descanso</label>
        </div>
        <div class="modal-buttons">
            <button class="btn-cancelar" id="cancelarEditarJornadaBtn">Cancelar</button>
            <button class="btn-guardar" id="guardarEditarJornadaBtn">Guardar</button>
        </div>
    </div>
</div>

<script>
    // DATOS INICIALES VACÍOS
    let trabajos = [];
    let jornadaActiva = null;
    let descansoActual = false;
    let trabajoEditandoId = null;
    let jornadaEditando = null;
    let trabajoCalendarioActual = null;
    let currentMonth = new Date();

    // Constantes
    const HORAS = Array.from({length: 24}, (_, i) => i.toString().padStart(2, '0'));
    const MINUTOS = Array.from({length: 60}, (_, i) => i.toString().padStart(2, '0'));
    const DIAS_SEMANA = ["Lun", "Mar", "Mié", "Jue", "Vie", "Sáb", "Dom"];
    const MESES = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];

    // Guardar y cargar datos
    function guardarDatos() {
        localStorage.setItem('controlLaboralV21', JSON.stringify({ trabajos, jornadaActiva }));
    }

    function cargarDatos() {
        let saved = localStorage.getItem('controlLaboralV21');
        if (saved) {
            let data = JSON.parse(saved);
            trabajos = data.trabajos || [];
            jornadaActiva = data.jornadaActiva || null;
        }
        actualizarUI();
    }

    // Clasificar horas (diurnas/nocturnas)
    function clasificarHoras(inicioStr, finStr) {
        let [iH, iM] = inicioStr.split(':').map(Number);
        let [fH, fM] = finStr.split(':').map(Number);
        let inicioMin = iH * 60 + iM;
        let finMin = fH * 60 + fM;
        if (finMin <= inicioMin) finMin += 24 * 60;
        let diurnas = 0, nocturnas = 0;
        for (let m = inicioMin; m < finMin; m++) {
            let md = m % (24 * 60);
            if (md >= 22 * 60 || md < 6 * 60) nocturnas++;
            else diurnas++;
        }
        return { diurnas: diurnas / 60, nocturnas: nocturnas / 60 };
    }

    // Calcular horas de una jornada
    function calcularJornada(trabajo, entrada, salida, descanso) {
        let { diurnas, nocturnas } = clasificarHoras(entrada, salida);
        let total = diurnas + nocturnas;
        let normalesDiurnas = diurnas, normalesNocturnas = nocturnas, extraDiurnas = 0, extraNocturnas = 0;
        
        if (trabajo.reglaDescanso === "pago") {
            if (!descanso) total += 0.5;
        } else {
            if (descanso) total -= 0.5;
        }
        
        let jornadaLegal = trabajo.jornadaLegal || 6;
        if (total > jornadaLegal) {
            let extra = total - jornadaLegal;
            let propDiurna = diurnas / (diurnas + nocturnas) || 0;
            extraDiurnas = extra * propDiurna;
            extraNocturnas = extra * (1 - propDiurna);
            normalesDiurnas = diurnas - extraDiurnas;
            normalesNocturnas = nocturnas - extraNocturnas;
        }
        
        let totalPagar = (normalesDiurnas * (trabajo.valorNormal || 12)) +
                         (normalesNocturnas * (trabajo.valorNocturno || 15)) +
                         (extraDiurnas * (trabajo.valorExtraDiurno || 18)) +
                         (extraNocturnas * (trabajo.valorExtraNocturno || 22));
        
        return { total: total.toFixed(1), totalPagar: totalPagar.toFixed(2), normalesDiurnas, normalesNocturnas, extraDiurnas, extraNocturnas };
    }

    // Iniciar jornada
    function iniciarJornada(trabajoId) {
        let trabajo = trabajos.find(t => t.id === trabajoId);
        if (!trabajo) return;
        let ahora = new Date();
        jornadaActiva = {
            trabajoId: trabajoId,
            trabajoNombre: trabajo.nombre,
            trabajoEmoji: trabajo.emoji,
            horaEntrada: ahora.toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' }),
            fecha: ahora.toISOString().split('T')[0],
            timestamp: ahora.getTime()
        };
        descansoActual = false;
        guardarDatos();
        actualizarUI();
    }

    // Finalizar jornada
    function finalizarJornada() {
        if (!jornadaActiva) return;
        let trabajo = trabajos.find(t => t.id === jornadaActiva.trabajoId);
        if (!trabajo) return;
        let ahora = new Date();
        let salida = ahora.toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
        let calculo = calcularJornada(trabajo, jornadaActiva.horaEntrada, salida, descansoActual);
        
        let nuevaJornada = {
            id: Date.now(),
            fecha: jornadaActiva.fecha,
            entrada: jornadaActiva.horaEntrada,
            salida: salida,
            descanso: descansoActual,
            total: parseFloat(calculo.total),
            totalPagar: parseFloat(calculo.totalPagar),
            diurnas: calculo.normalesDiurnas,
            nocturnas: calculo.normalesNocturnas,
            extraDiurnas: calculo.extraDiurnas,
            extraNocturnas: calculo.extraNocturnas
        };
        
        if (!trabajo.jornadas) trabajo.jornadas = [];
        trabajo.jornadas.unshift(nuevaJornada);
        jornadaActiva = null;
        guardarDatos();
        actualizarUI();
    }

    // Eliminar jornada
    function eliminarJornada(trabajoId, jornadaId) {
        let trabajo = trabajos.find(t => t.id === trabajoId);
        if (trabajo && trabajo.jornadas) {
            trabajo.jornadas = trabajo.jornadas.filter(j => j.id !== jornadaId);
            guardarDatos();
            actualizarUI();
            if (document.getElementById('diaModal').style.display === 'flex') {
                let fecha = document.getElementById('diaModalTitulo').innerText;
                // Reabrir el modal del día actualizado
            }
        }
    }

    // Editar jornada
    function editarJornada(trabajoId, jornada) {
        jornadaEditando = { ...jornada, trabajoId: trabajoId };
        let [eH, eM] = jornada.entrada.split(':');
        let [sH, sM] = jornada.salida.split(':');
        
        function cargarRuedas() {
            document.getElementById('entradaHoraScroll').innerHTML = HORAS.map(h => `<div class="${h === eH ? 'selected' : ''}">${h}</div>`).join('');
            document.getElementById('entradaMinScroll').innerHTML = MINUTOS.map(m => `<div class="${m === eM ? 'selected' : ''}">${m}</div>`).join('');
            document.getElementById('salidaHoraScroll').innerHTML = HORAS.map(h => `<div class="${h === sH ? 'selected' : ''}">${h}</div>`).join('');
            document.getElementById('salidaMinScroll').innerHTML = MINUTOS.map(m => `<div class="${m === sM ? 'selected' : ''}">${m}</div>`).join('');
            
            [document.getElementById('entradaHoraScroll'), document.getElementById('entradaMinScroll'), 
             document.getElementById('salidaHoraScroll'), document.getElementById('salidaMinScroll')].forEach(scroll => {
                scroll.querySelectorAll('div').forEach(div => div.onclick = function() {
                    scroll.querySelectorAll('div').forEach(d => d.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });
        }
        cargarRuedas();
        document.getElementById('editarDescansoCheck').checked = jornada.descanso;
        document.getElementById('editarJornadaModal').style.display = 'flex';
    }

    function guardarEdicionJornada() {
        if (!jornadaEditando) return;
        let nuevaEntrada = `${document.querySelector('#entradaHoraScroll div.selected')?.textContent || '00'}:${document.querySelector('#entradaMinScroll div.selected')?.textContent || '00'}`;
        let nuevaSalida = `${document.querySelector('#salidaHoraScroll div.selected')?.textContent || '00'}:${document.querySelector('#salidaMinScroll div.selected')?.textContent || '00'}`;
        let descanso = document.getElementById('editarDescansoCheck').checked;
        
        let trabajo = trabajos.find(t => t.id === jornadaEditando.trabajoId);
        if (!trabajo) return;
        
        let calculo = calcularJornada(trabajo, nuevaEntrada, nuevaSalida, descanso);
        let jornadaActualizada = {
            ...jornadaEditando,
            entrada: nuevaEntrada,
            salida: nuevaSalida,
            descanso: descanso,
            total: parseFloat(calculo.total),
            totalPagar: parseFloat(calculo.totalPagar),
            diurnas: calculo.normalesDiurnas,
            nocturnas: calculo.normalesNocturnas,
            extraDiurnas: calculo.extraDiurnas,
            extraNocturnas: calculo.extraNocturnas
        };
        
        let idx = trabajo.jornadas.findIndex(j => j.id === jornadaEditando.id);
        if (idx !== -1) trabajo.jornadas[idx] = jornadaActualizada;
        
        guardarDatos();
        actualizarUI();
        document.getElementById('editarJornadaModal').style.display = 'none';
        jornadaEditando = null;
    }

    // CRUD Trabajos
    function agregarTrabajo() {
        trabajoEditandoId = null;
        document.getElementById('editarTrabajoTitulo').textContent = 'Nuevo trabajo';
        document.getElementById('trabajoNombre').value = '';
        document.getElementById('trabajoEmoji').value = '🏢';
        document.getElementById('valorNormal').value = '12';
        document.getElementById('valorNocturno').value = '15';
        document.getElementById('valorExtraDiurno').value = '18';
        document.getElementById('valorExtraNocturno').value = '22';
        document.getElementById('reglaDescanso').value = 'pago';
        document.getElementById('jornadaLegal').value = '6';
        document.getElementById('editarTrabajoModal').style.display = 'flex';
    }

    function editarTrabajo(trabajo) {
        trabajoEditandoId = trabajo.id;
        document.getElementById('editarTrabajoTitulo').textContent = 'Editar trabajo';
        document.getElementById('trabajoNombre').value = trabajo.nombre;
        document.getElementById('trabajoEmoji').value = trabajo.emoji || '🏢';
        document.getElementById('valorNormal').value = trabajo.valorNormal || 12;
        document.getElementById('valorNocturno').value = trabajo.valorNocturno || 15;
        document.getElementById('valorExtraDiurno').value = trabajo.valorExtraDiurno || 18;
        document.getElementById('valorExtraNocturno').value = trabajo.valorExtraNocturno || 22;
        document.getElementById('reglaDescanso').value = trabajo.reglaDescanso || 'pago';
        document.getElementById('jornadaLegal').value = trabajo.jornadaLegal || 6;
        document.getElementById('editarTrabajoModal').style.display = 'flex';
    }

    function guardarTrabajo() {
        let nombre = document.getElementById('trabajoNombre').value.trim();
        let emoji = document.getElementById('trabajoEmoji').value.trim() || '🏢';
        if (!nombre) { alert('Ingresa un nombre'); return; }
        
        let trabajo = {
            id: trabajoEditandoId || Date.now(),
            nombre: nombre,
            emoji: emoji,
            valorNormal: parseFloat(document.getElementById('valorNormal').value) || 0,
            valorNocturno: parseFloat(document.getElementById('valorNocturno').value) || 0,
            valorExtraDiurno: parseFloat(document.getElementById('valorExtraDiurno').value) || 0,
            valorExtraNocturno: parseFloat(document.getElementById('valorExtraNocturno').value) || 0,
            reglaDescanso: document.getElementById('reglaDescanso').value,
            jornadaLegal: parseFloat(document.getElementById('jornadaLegal').value) || 6,
            jornadas: []
        };
        
        if (trabajoEditandoId) {
            let idx = trabajos.findIndex(t => t.id === trabajoEditandoId);
            if (idx !== -1) {
                trabajo.jornadas = trabajos[idx].jornadas || [];
                trabajos[idx] = trabajo;
            }
        } else {
            trabajo.jornadas = [];
            trabajos.push(trabajo);
        }
        
        guardarDatos();
        actualizarUI();
        document.getElementById('editarTrabajoModal').style.display = 'none';
        document.getElementById('configModal').style.display = 'flex';
    }

    function eliminarTrabajo(id) {
        if (confirm('¿Eliminar este trabajo y todas sus jornadas?')) {
            trabajos = trabajos.filter(t => t.id !== id);
            if (jornadaActiva && jornadaActiva.trabajoId === id) jornadaActiva = null;
            guardarDatos();
            actualizarUI();
        }
    }

    // Calendario
    function verCalendario(trabajo) {
        trabajoCalendarioActual = trabajo;
        currentMonth = new Date();
        document.getElementById('calendarioTitulo').textContent = `${trabajo.emoji} ${trabajo.nombre}`;
        renderizarCalendario();
        document.getElementById('calendarioModal').style.display = 'flex';
    }

    function renderizarCalendario() {
        if (!trabajoCalendarioActual) return;
        let año = currentMonth.getFullYear();
        let mes = currentMonth.getMonth();
        document.getElementById('mesTitulo').textContent = `${MESES[mes]} ${año}`;
        
        let primerDia = new Date(año, mes, 1);
        let ultimoDia = new Date(año, mes + 1, 0);
        let inicioSemana = primerDia.getDay();
        let ajuste = inicioSemana === 0 ? 6 : inicioSemana - 1;
        
        let grid = document.getElementById('calendarioGrid');
        grid.innerHTML = '';
        for (let i = 0; i < 7; i++) grid.innerHTML += `<div class="calendario-dia-header">${DIAS_SEMANA[i]}</div>`;
        for (let i = 0; i < ajuste; i++) grid.innerHTML += `<div class="calendario-dia other-month"></div>`;
        
        let jornadas = trabajoCalendarioActual.jornadas || [];
        for (let d = 1; d <= ultimoDia.getDate(); d++) {
            let fechaStr = `${año}-${(mes+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
            let jornadasDia = jornadas.filter(j => j.fecha === fechaStr);
            let totalHorasDia = jornadasDia.reduce((sum, j) => sum + j.total, 0);
            let horasText = totalHorasDia > 0 ? `${totalHorasDia.toFixed(1)}h` : '';
            grid.innerHTML += `
                <div class="calendario-dia" data-fecha="${fechaStr}">
                    <div class="numero">${d}</div>
                    <div class="horas">${horasText}</div>
                </div>
            `;
        }
        
        document.querySelectorAll('.calendario-dia[data-fecha]').forEach(el => {
            el.onclick = () => abrirModalDia(el.dataset.fecha);
        });
    }

    function abrirModalDia(fechaStr) {
        if (!trabajoCalendarioActual) return;
        let fecha = new Date(fechaStr);
        document.getElementById('diaModalTitulo').textContent = `${DIAS_SEMANA[fecha.getDay() === 0 ? 6 : fecha.getDay()-1]} ${fecha.getDate()} ${MESES[fecha.getMonth()]} ${fecha.getFullYear()}`;
        let jornadasDia = (trabajoCalendarioActual.jornadas || []).filter(j => j.fecha === fechaStr);
        let lista = document.getElementById('jornadasDiaLista');
        lista.innerHTML = '';
        if (jornadasDia.length === 0) {
            lista.innerHTML = '<div style="color:#a0a0a0; text-align:center; padding:20px;">No hay jornadas este día</div>';
        } else {
            jornadasDia.forEach(j => {
                let div = document.createElement('div');
                div.className = 'jornada-item';
                div.innerHTML = `
                    <div class="jornada-info">
                        <div class="jornada-fecha">${j.entrada} - ${j.salida} ${j.descanso ? '🍽️' : ''}</div>
                        <div class="jornada-horas">${j.total}h - ${j.totalPagar}€</div>
                    </div>
                    <div class="jornada-actions">
                        <button class="btn-icon btn-editar" data-id="${j.id}">✏️</button>
                        <button class="btn-icon btn-eliminar" data-id="${j.id}">🗑️</button>
                    </div>
                `;
                lista.appendChild(div);
            });
        }
        document.querySelectorAll('.btn-editar').forEach(btn => {
            let jornada = jornadasDia.find(j => j.id === parseInt(btn.dataset.id));
            if (jornada) btn.onclick = () => editarJornada(trabajoCalendarioActual.id, jornada);
        });
        document.querySelectorAll('.btn-eliminar').forEach(btn => {
            btn.onclick = () => eliminarJornada(trabajoCalendarioActual.id, parseInt(btn.dataset.id));
        });
        document.getElementById('agregarJornadaDiaBtn').onclick = () => {
            document.getElementById('diaModal').style.display = 'none';
            alert('Funcionalidad: agregar jornada manual a ' + fechaStr);
        };
        document.getElementById('diaModal').style.display = 'flex';
    }

    // UI Principal
    function actualizarUI() {
        let ahora = new Date();
        document.getElementById('horaActual').textContent = ahora.toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        document.getElementById('fechaActual').textContent = ahora.toLocaleDateString('es-ES', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
        
        let activoContainer = document.getElementById('jornadaActivaContainer');
        if (jornadaActiva) {
            let diff = Date.now() - jornadaActiva.timestamp;
            let horas = Math.floor(diff/3600000);
            let minutos = Math.floor((diff%3600000)/60000);
            let segundos = Math.floor((diff%60000)/1000);
            activoContainer.innerHTML = `
                <div class="jornada-activa-card">
                    <div class="trabajo-nombre">${jornadaActiva.trabajoEmoji} ${jornadaActiva.trabajoNombre}</div>
                    <div class="tiempo-transcurrido">${horas.toString().padStart(2,'0')}:${minutos.toString().padStart(2,'0')}:${segundos.toString().padStart(2,'0')}</div>
                    <div class="descanso-check"><input type="checkbox" id="descansoActivoCheck"><label>Realicé media hora de descanso</label></div>
                    <div><button class="btn-modificar-hora" id="modificarEntradaBtn">📝 Modificar hora entrada</button></div>
                    <div><button class="btn-finalizar" id="finalizarActivoBtn">🏁 Finalizar jornada</button></div>
                </div>
            `;
            let descansoCheck = document.getElementById('descansoActivoCheck');
            if (descansoCheck) descansoCheck.addEventListener('change', (e) => descansoActual = e.target.checked);
            document.getElementById('modificarEntradaBtn')?.addEventListener('click', () => alert('Modificar hora entrada - Próximamente'));
            document.getElementById('finalizarActivoBtn')?.addEventListener('click', () => finalizarJornada());
        } else {
            activoContainer.innerHTML = '';
        }
        
        let container = document.getElementById('trabajosContainer');
        if (trabajos.length === 0) {
            container.innerHTML = `
                <div class="mensaje-vacio">
                    <p>👋 ¡Bienvenido!</p>
                    <p>No tienes trabajos registrados.</p>
                    <button class="btn-primario" id="btnAgregarPrimerTrabajo">+ Agregar mi primer trabajo</button>
                </div>
            `;
            document.getElementById('btnAgregarPrimerTrabajo')?.addEventListener('click', agregarTrabajo);
        } else {
            container.innerHTML = '';
            trabajos.forEach(trabajo => {
                let card = document.createElement('div');
                card.className = 'trabajo-card';
                card.innerHTML = `
                    <div class="trabajo-info">
                        <div class="trabajo-emoji">${trabajo.emoji || '🏢'}</div>
                        <div class="trabajo-nombre">${trabajo.nombre}</div>
                    </div>
                    <div class="trabajo-actions">
                        <button class="btn-trabajo calendario" data-id="${trabajo.id}" data-accion="calendario">📅</button>
                        <button class="btn-trabajo entrar" data-id="${trabajo.id}" data-accion="entrar">▶ ENTRAR</button>
                    </div>
                `;
                container.appendChild(card);
            });
            document.querySelectorAll('.btn-trabajo').forEach(btn => {
                let trabajoId = parseInt(btn.dataset.id);
                let accion = btn.dataset.accion;
                btn.onclick = () => {
                    let trabajo = trabajos.find(t => t.id === trabajoId);
                    if (accion === 'entrar') iniciarJornada(trabajoId);
                    else if (accion === 'calendario') verCalendario(trabajo);
                };
            });
        }
        
        // Configuración lista
        let configLista = document.getElementById('trabajosConfigLista');
        if (configLista) {
            configLista.innerHTML = '';
            trabajos.forEach(trabajo => {
                let totalHorasMes = (trabajo.jornadas || []).reduce((sum, j) => sum + j.total, 0);
                let totalPagarMes = (trabajo.jornadas || []).reduce((sum, j) => sum + j.totalPagar, 0);
                let div = document.createElement('div');
                div.className = 'trabajo-config-item';
                div.innerHTML = `
                    <div class="trabajo-config-info">
                        <div class="nombre">${trabajo.emoji || '🏢'} ${trabajo.nombre}</div>
                        <div class="stats">📊 ${totalHorasMes.toFixed(1)}h - ${totalPagarMes.toFixed(2)}€ este mes</div>
                    </div>
                    <div class="trabajo-config-actions">
                        <button class="config-icon" data-id="${trabajo.id}" data-accion="calendario">📅</button>
                        <button class="config-icon" data-id="${trabajo.id}" data-accion="editar">✏️</button>
                        <button class="config-icon" data-id="${trabajo.id}" data-accion="eliminar">🗑️</button>
                    </div>
                `;
                configLista.appendChild(div);
            });
            document.querySelectorAll('#trabajosConfigLista .config-icon').forEach(btn => {
                let trabajoId = parseInt(btn.dataset.id);
                let accion = btn.dataset.accion;
                let trabajo = trabajos.find(t => t.id === trabajoId);
                btn.onclick = () => {
                    if (accion === 'editar') editarTrabajo(trabajo);
                    else if (accion === 'eliminar') eliminarTrabajo(trabajoId);
                    else if (accion === 'calendario') verCalendario(trabajo);
                };
            });
        }
    }

    // Inicializar
    function init() {
        cargarDatos();
        setInterval(() => actualizarUI(), 1000);
        
        document.getElementById('configBtn').onclick = () => document.getElementById('configModal').style.display = 'flex';
        document.getElementById('closeConfigBtn').onclick = () => document.getElementById('configModal').style.display = 'none';
        document.getElementById('agregarTrabajoBtn').onclick = agregarTrabajo;
        document.getElementById('closeEditarTrabajoBtn').onclick = () => document.getElementById('editarTrabajoModal').style.display = 'none';
        document.getElementById('cancelarEditarTrabajoBtn').onclick = () => document.getElementById('editarTrabajoModal').style.display = 'none';
        document.getElementById('guardarEditarTrabajoBtn').onclick = guardarTrabajo;
        document.getElementById('closeCalendarioBtn').onclick = () => document.getElementById('calendarioModal').style.display = 'none';
        document.getElementById('cerrarCalendarioBtn').onclick = () => document.getElementById('calendarioModal').style.display = 'none';
        document.getElementById('prevMonthBtn').onclick = () => { currentMonth.setMonth(currentMonth.getMonth()-1); renderizarCalendario(); };
        document.getElementById('nextMonthBtn').onclick = () => { currentMonth.setMonth(currentMonth.getMonth()+1); renderizarCalendario(); };
        document.getElementById('closeDiaBtn').onclick = () => document.getElementById('diaModal').style.display = 'none';
        document.getElementById('closeEditarJornadaBtn').onclick = () => document.getElementById('editarJornadaModal').style.display = 'none';
        document.getElementById('cancelarEditarJornadaBtn').onclick = () => document.getElementById('editarJornadaModal').style.display = 'none';
        document.getElementById('guardarEditarJornadaBtn').onclick = guardarEdicionJornada;
    }
    
    init();
</script>
</body>
</html>
